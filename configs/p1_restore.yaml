# Pillar 1 — uses an EXISTING vertical reel as the background.
# Source: Instagram reel DXXGq9YjDos (turquoise stream flowing through a
# green Himalayan-style valley, khwaja_hasnain). Caption ref:
# "This & no stress."
# Saved to R2 as `background videos/mountain_stream.mp4`.
# Prayer leans on Psalm 23:2-3 — still waters, restored soul.
# Note: third-party footage; verify licensing before commercial use.
#   python prayer_reel_pipeline.py configs/p1_restore.yaml --upload-r2
slug: p1_restore

background:
  type: video
  video: https://pub-009ad35726e64a38930ccc6e3aff0a81.r2.dev/background%20videos/mountain_stream.mp4

duration: 14          # 11.4s source slowed to 14s (gentle ~1.23x slow-mo)
darken: 0.25          # bright sky/clouds; medium darken for text contrast

text:
  font: serif
  size: 68
  align: center
  position: center
  color: white
  lines: |
    You lead me
    beside still waters.

    When my soul
    feels weary,
    You restore me.

    Amen.

cta:
  text: "Follow @livepraybiblelove"
  duration: 1.6
  fade: 0.4

music:
  folder: "/Users/tom-new/livepraybiblenow/.claude/worktrees/unruffled-swanson-24a9fd/background music"
  volume: 0.18

output_dir: output/p1_restore
