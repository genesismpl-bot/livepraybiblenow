# Pillar 2 — woman, sunlit kitchen, morning prayer over coffee.
# Validated by scripts/validate_pillar2.py (lady ✓ / unique slot ✓ / music rotates ✓).
slug: p2_lady_kitchen_morning
scene_slot: lady_kitchen_morning   # uniqueness key for the Pillar 2 validator

background:
  type: scene
  scene: >
    A woman in her early thirties standing alone at a sunlit kitchen
    window, both hands cradling her face, fingers covering her eyes
    as she prays, tears running down her cheeks between her fingers,
    head bowed, shoulders softened, a coffee mug forgotten on the
    counter beside her, soft morning light streaming through the
    window, warm cream and golden tones, face mostly obscured by her
    hands, intimate cinematic photography, shallow depth of field,
    no text, no watermark.
  motion: >
    A very subtle slow camera push-in toward her hands, a single
    tear slowly tracing down between her fingers, soft light
    gradually shifting, calm and reverent, she does not move her
    body, no camera shake.
  kling_duration: 5

duration: 13
darken: 0.30

text:
  font: serif
  size: 62
  align: center
  position: center
  color: white
  lines: |
    Lord, thank You
    for this morning.

    Walk with me
    through every
    hour today.

    Amen.

cta:
  text: "Follow @livepraybiblelove"
  duration: 1.6
  fade: 0.4

music:
  path: "assets/music/cece_winans_goodness_of_god.mp3"
  volume: 0.32
  start_at: 60      # chorus entry on most masters of this song
  fade_in: 0.5

output_dir: output/p2_lady_kitchen_morning
