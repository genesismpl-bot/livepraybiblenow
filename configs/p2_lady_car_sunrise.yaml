# Pillar 2 — young woman in her car at sunrise, praying before her day.
slug: p2_lady_car_sunrise
scene_slot: lady_car_sunrise

background:
  type: scene
  scene: >
    A young woman in her late twenties seated alone in the driver's
    seat of a car, head bowed against the top rim of the steering
    wheel, long hair falling forward to cover her face, both hands
    clasped tightly together on the wheel as she prays, silent tears
    streaming down behind the curtain of her hair, shoulders heavy,
    warm golden sunrise light pouring through the windshield, soft
    lens flare, a thin gold cross necklace at her collarbone, face
    obscured by her hair, intimate cinematic photography, shallow
    depth of field, no text, no watermark.
  motion: >
    A very subtle slow camera push-in, the sunrise light gradually
    growing, gentle warm flares shifting across the dashboard, a
    single tear sliding into view from behind her hair, calm and
    steady, she does not move, no camera shake.
  kling_duration: 5

duration: 13
darken: 0.32

text:
  font: serif
  size: 62
  align: center
  position: center
  color: white
  lines: |
    Lord, go before me
    today.

    Give me strength
    for what is ahead,
    and peace for
    what is unknown.

    Amen.

cta:
  text: "Follow @livepraybible"
  duration: 1.6
  fade: 0.4

music:
  path: "assets/music/phil_wickham_house_of_the_lord.mp3"
  volume: 0.32
  start_at: 30      # main hook lands early in this track
  fade_in: 0.5

output_dir: output/p2_lady_car_sunrise
