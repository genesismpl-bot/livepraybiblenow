# Pillar 3 (viral hook + CTA) — SHELTER theme. Pivot C.
# Hook: r2://livepraybible/hooks/DWzAa3miXIK.mp4 (24.5s source, trimmed 0–15s).
# Source reel: teddy bear shelters a hen family from a rainstorm — welcomed
# in, dried off, fed. Payload pairs it with Psalm 91:4 (feathers / wings /
# refuge), so the hook IS the verse made visible.
slug: viral_teddy_shelter

hook:
  source: "https://pub-009ad35726e64a38930ccc6e3aff0a81.r2.dev/hooks/DWzAa3miXIK.mp4"
  start:  0.0
  end:    15.0

script: |
  Stop *doomscrolling*.
  Talk to *God* instead.
  He will cover you with His *feathers*.
  Under His *wings* you will find *refuge*.
  Psalm 91, verse 4.
  Whatever storm you're in,
  God's door is always *open*.
  Amen.

still_path: assets/stills/candle_dark.png

motion:
  type:     ken_burns_slow_zoom
  zoom_to:  1.08
  duration: 14.0

voice:
  voice_id:   "alFofuDn3cOwyoz1i44T"
  stability:  0.50
  similarity: 0.80
  style:      0.35
  apply_phone_mic_filter: false

captions:
  style:           source_match
  mode:            sentence
  font_size:       84
  margin_v:        0
  alignment:       5
  colour:          "#FFFFFF"
  emphasis_colour: "#FFD700"
  chunk_size:      4

cta:
  text:     "Follow @livepraybiblelove for a prayer every day"
  duration: 1.5
  fade_in:  0.4
  y_frac:   0.78
  font_size: 64

music:
  path:     "assets/music/soft_piano_prayer.mp3"
  volume:   0.15
  fade_in:  1.0
  fade_out: 1.5

variants:   1
output_dir: output/viral_teddy_shelter
