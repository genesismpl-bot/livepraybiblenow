# ── hook_pivot_pipeline.py config ─────────────────────────────────────
# "Behind" — Segment 2 #9 from the script shortlist.
# Theme: God's timing isn't late — biblical figures who started late.
#
# Run:
#   python hook_pivot_pipeline.py configs/behind.yaml

slug: behind

# ── Segment 1: viral hook ────────────────────────────────────────────
# TODO: set source to an external viral clip (e.g. one of the hook
# variants from the MMO framework — boomwhackers, marble drop, etc.).
hook:
  source: "TODO_set_path_to_external_viral_hook.mp4"
  start: 0.0
  end:   12.0

# ── Segment 2: bible payload ─────────────────────────────────────────
# Opener A (softer question) + script #9 "Behind" body.
script: |
  Stop *doomscrolling*.
  Have you *prayed* today?
  Feel like you're *behind* in life?
  Joseph was *thirty* when his dream came true.
  Moses was *eighty* when God *called* him.
  Abraham had his son at *one hundred*.
  God's timing isn't *late*. It's *exact*.

# Backdrop: Gemini-generated Catholic-themed still (3 variants — pick best).
# To use a fixed backdrop instead, set still_path: assets/stills/<file>.png
# and comment out the scene block below.
scene: |
  Vertical 9:16 cinematic still, 1080x1920. Ornate Catholic golden
  crucifix on a dark polished wooden altar, soft warm rays of divine
  light streaming from the upper frame casting glowing highlights on
  the cross, faint dust particles visible in the light, deep shadowed
  cathedral interior in the background fading to black, hint of
  stained glass colour in the far distance. Reverent sacred minimal
  aesthetic, phone-camera grain, NO people, NO phones, NO text
  overlays.

# Slow Ken-Burns zoom across the payload duration.
motion:
  type:     ken_burns_slow_zoom
  zoom_to:  1.08
  duration: 12.0

# ── Voice ────────────────────────────────────────────────────────────
# Dallin — middle-aged American male, "Calming, Deep, Warm. Perfect
# for stories." (ElevenLabs ID alFofuDn3cOwyoz1i44T)
voice:
  voice_id:   "alFofuDn3cOwyoz1i44T"
  stability:  0.50
  similarity: 0.80
  style:      0.35
  apply_phone_mic_filter: false

# ── Captions: sentence-mode with gold emphasis on *marked* words ─────
# Lower-third positioning so text doesn't compete with center-frame imagery
# (cross / focal point). ASS alignment 2 = bottom-center; margin_v is the
# distance from the bottom edge of the frame to the bottom of the text.
captions:
  style:           source_match
  mode:            sentence
  font_size:       84
  margin_v:        280
  alignment:       2
  colour:          "#FFFFFF"
  emphasis_colour: "#FFD700"
  chunk_size:      4

# ── End-card CTA ─────────────────────────────────────────────────────
# y_frac places the CTA in the lower-third (same zone as the captions, but
# the captions are gone by the time the CTA fades in).
cta:
  text:     "Follow @livepraybible for daily verses"
  duration: 1.5
  fade_in:  0.4
  y_frac:   0.78
  font_size: 64

# ── Generation knobs ─────────────────────────────────────────────────
variants:   3
output_dir: output/behind
