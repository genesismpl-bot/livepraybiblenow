# Pillar 1 — uses an EXISTING vertical reel as the background.
# Source: Instagram reel DXfldxTEXsZ (darkssiren) — surreal starlit ring
# above stylized clouds with light reflected in a stream below.
# Recontextualised as John 1:5 — light shining through the darkness.
# Saved to R2 as `background videos/starry_horizon.mp4`.
# Note: third-party footage; verify licensing before commercial use.
#   python prayer_reel_pipeline.py configs/p1_light.yaml --upload-r2
slug: p1_light

background:
  type: video
  video: https://pub-009ad35726e64a38930ccc6e3aff0a81.r2.dev/background%20videos/starry_horizon.mp4

duration: 14          # 10.5s source slowed to 14s (gentle ~1.34x)
darken: 0.15          # already very dark — light darken keeps stars visible

text:
  font: serif
  size: 68
  align: center
  position: center
  color: white
  lines: |
    Lord,
    even here,
    Your light
    shines through.

    The darkness
    cannot overcome it.

    The darkness
    cannot overcome me.

    Amen.

cta:
  text: "Follow @livepraybible"
  duration: 1.6
  fade: 0.4

music:
  folder: "/Users/tom-new/livepraybiblenow/.claude/worktrees/unruffled-swanson-24a9fd/background music"
  volume: 0.18

output_dir: output/p1_light
