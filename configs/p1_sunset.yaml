# Pillar 1 — uses an EXISTING vertical reel as the background.
# Source: Instagram reel DXxn-2Fuc6n (sunset), saved to assets/backgrounds/.
# Note: third-party footage; verify licensing before commercial use.
#   python prayer_reel_pipeline.py configs/p1_sunset.yaml --upload-r2
slug: p1_sunset

background:
  type: video
  video: https://pub-009ad35726e64a38930ccc6e3aff0a81.r2.dev/backgrounds/sunset_reel.mp4

duration: 14          # 9.7s source slowed to 14s (gentle ~1.44x slow-mo)
darken: 0.30          # sunset is bright; bump darken so white text reads

text:
  font: serif
  size: 70
  align: center
  position: center
  color: white
  lines: |
    Father,
    You painted this sky
    for me.

    Thank You
    for another day
    in Your light.

    Amen.

cta:
  text: "Follow @livepraybible"
  duration: 1.6
  fade: 0.4

# No music — add a trending/worship audio in-app on Instagram.

music:
  folder: "/Users/tom-new/livepraybiblenow/.claude/worktrees/unruffled-swanson-24a9fd/background music"
  volume: 0.18

output_dir: output/p1_sunset
