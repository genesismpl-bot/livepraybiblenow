# Pillar 1 — uses an EXISTING vertical reel as the background.
# Source: Instagram reel DYHZcc1AAJT (liushanshan0451 / Mawei) — fiery
# desert sunset with a small camp setup in the foreground.
# Original caption: "Stop scrolling. This sunset is for you."
# Recontextualised as Matthew 11:28 — "Come to me, I will give you rest."
# Saved to R2 as `background videos/desert_sunset.mp4`.
# Note: third-party footage; verify licensing before commercial use.
#   python prayer_reel_pipeline.py configs/p1_rest.yaml --upload-r2
slug: p1_rest

background:
  type: video
  video: https://pub-009ad35726e64a38930ccc6e3aff0a81.r2.dev/background%20videos/desert_sunset.mp4

duration: 14          # 7.0s source slowed to 14s (~2x slow-mo — fits the calm theme)
darken: 0.30          # bright fiery sky needs decent darken for white text

text:
  font: serif
  size: 68
  align: center
  position: center
  color: white
  lines: |
    Lord,
    slow me down.

    Come to me, You say.
    I will give you rest.

    Let me sit with You.
    Just here. Just now.

    Amen.

cta:
  text: "Follow @livepraybible"
  duration: 1.6
  fade: 0.4

music:
  folder: "/Users/tom-new/livepraybiblenow/.claude/worktrees/unruffled-swanson-24a9fd/background music"
  volume: 0.18

output_dir: output/p1_rest
