# Pillar 1 — uses an EXISTING vertical reel as the background.
# Source: Instagram reel DY-3GbbtlIV (calme.mmt / StillMoments) — serene
# golden-hour modern sanctuary with floor-to-ceiling windows, god-rays
# through trees, glowing lamps and reflective floor.
# Original caption: "Some rooms don't need words."
# Recontextualised as Matthew 6:6 / Psalm 139 — God in the quiet,
# hearing the heart without words.
# Saved to R2 as `background videos/golden_sanctuary.mp4`.
# Note: third-party footage; verify licensing before commercial use.
#   python prayer_reel_pipeline.py configs/p1_secret_place.yaml --upload-r2
slug: p1_secret_place

background:
  type: video
  video: https://pub-009ad35726e64a38930ccc6e3aff0a81.r2.dev/background%20videos/golden_sanctuary.mp4

duration: 14          # 10s source slowed to 14s (gentle ~1.4x)
darken: 0             # per request: no colour filter — preserve the warm golden palette.
                      # drawtext shadow handles text readability.

text:
  font: serif
  size: 68
  align: center
  position: center
  color: white
  lines: |
    Lord,
    in the quiet,
    You are here.

    Without words,
    You hear
    what my heart
    is saying.

    Amen.

cta:
  text: "Follow @livepraybible"
  duration: 1.6
  fade: 0.4

music:
  folder: "/Users/tom-new/livepraybiblenow/.claude/worktrees/unruffled-swanson-24a9fd/background music"
  volume: 0.18

output_dir: output/p1_secret_place
