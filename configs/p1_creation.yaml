# Pillar 1 — uses an EXISTING vertical reel as the background.
# Source: Instagram reel DX_4prwMJWE (Swiss nature: mountains/lakes/greenery),
# saved to assets/backgrounds/swiss_nature.mp4.
# Note: third-party footage; verify licensing before commercial use.
#   python prayer_reel_pipeline.py configs/p1_creation.yaml --upload-r2
slug: p1_creation

background:
  type: video
  video: https://pub-009ad35726e64a38930ccc6e3aff0a81.r2.dev/background%20videos/swiss_nature.mp4

duration: 16          # 14.6s source slowed to 16s (gentle slow-mo)
darken: 0.30          # bright snow/water; bump darken so white text reads

text:
  font: serif
  size: 70
  align: center
  position: center
  color: white
  lines: |
    The heavens declare
    Your glory, Lord.

    Open my eyes
    to see You
    in every breath
    of creation.

    Amen.

cta:
  text: "Follow @livepraybible"
  duration: 1.6
  fade: 0.4

# No music — add a trending/worship audio in-app on Instagram.

music:
  folder: "/Users/tom-new/livepraybiblenow/.claude/worktrees/unruffled-swanson-24a9fd/background music"
  volume: 0.18

output_dir: output/p1_creation
