# Pillar 3 (viral hook + CTA) — PRESENCE theme. Pivot A.
# Hook: r2://livepraybible/hooks/DYcTYuJRG_E.mp4 (11.5s "Starry Sky Cave",
#   Guizhou China — glowing blue cavern that looks like a galaxy underground).
# Improvement on the teddy reel: instead of pivoting to a static candle still
# (a retention cliff), the gorgeous cave footage stays on screen for the whole
# payload via background_video (looped). Still Pillar 3: doomscroll hook + CTA.
# Verse: Psalm 139:11-12 — darkness shining like day matches the cave literally.
slug: viral_starry_cave

hook:
  source: "https://pub-009ad35726e64a38930ccc6e3aff0a81.r2.dev/hooks/DYcTYuJRG_E.mp4"
  start:  0.0
  end:    8.0

# Payload keeps the cave on screen (looped to VO length) instead of a still.
background_video: "https://pub-009ad35726e64a38930ccc6e3aff0a81.r2.dev/hooks/DYcTYuJRG_E.mp4"

script: |
  Stop *doomscrolling*.
  Have you *prayed* today?
  Even in the *darkness*,
  You are already there.
  The night shines like the *day* to You.
  I am never *hidden* from Your love.
  Psalm 139.
  Amen.

still_path: assets/stills/candle_dark.png

motion:
  type:     ken_burns_slow_zoom
  zoom_to:  1.08
  duration: 14.0

voice:
  voice_id:   "alFofuDn3cOwyoz1i44T"
  stability:  0.50
  similarity: 0.80
  style:      0.35
  apply_phone_mic_filter: false

captions:
  style:           source_match
  mode:            sentence
  font_size:       84
  margin_v:        0
  alignment:       5
  colour:          "#FFFFFF"
  emphasis_colour: "#FFD700"
  chunk_size:      4

cta:
  text:     "Follow @livepraybible for a prayer every day"
  duration: 1.5
  fade_in:  0.4
  y_frac:   0.78
  font_size: 64

music:
  path:     "assets/music/soft_cinematic_pad.mp3"
  volume:   0.15
  fade_in:  1.0
  fade_out: 1.5

variants:   1
output_dir: output/viral_starry_cave
