name: IG post scheduler

# Runs every 15 minutes. Cron times are UTC.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:                # allow manual triggering too

permissions:
  contents: write                   # commit queue updates back

jobs:
  scheduler:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install rclone (used by lib.shared.upload_to_r2)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y rclone

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml python-dotenv requests

      - name: Run scheduler
        env:
          INSTAGRAM_LONG_LIVED_TOKEN: ${{ secrets.INSTAGRAM_LONG_LIVED_TOKEN }}
          IG_USER_ID:                 ${{ secrets.IG_USER_ID }}
          R2_ACCESS_KEY_ID:           ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:       ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT:                ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET:                  ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL:         ${{ secrets.R2_PUBLIC_BASE_URL }}
        run: python scheduler.py

      - name: Commit queue updates
        run: |
          if [[ -n "$(git status --porcelain configs/post_queue.yaml)" ]]; then
            git config user.name  "livepraybible-bot"
            git config user.email "bot@livepraybiblelove.local"
            git add configs/post_queue.yaml
            git commit -m "scheduler: mark due posts (auto)"
            git push
          else
            echo "no queue changes to commit"
          fi

  # Token refresh — runs weekly on Mondays at 04:00 UTC. Keeps the 60-day
  # IG long-lived token rolling. Requires the WORKFLOW_PAT secret (a PAT
  # with 'repo' scope) so the workflow can update the INSTAGRAM_LONG_LIVED_TOKEN
  # secret itself; if you'd rather refresh manually, delete this job.
  # refresh_token:
  #   runs-on: ubuntu-latest
  #   if: github.event_name == 'schedule'
  #   ...
