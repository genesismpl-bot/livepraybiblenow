name: Render + publish reel

# One-click full loop:
#   pipeline + config + committed caption_file
#     → render in CI
#     → upload final.mp4 to R2
#     → post the Reel to @livepraybible via the Graph API
#
# This is the "0 local machine" entry point. For scheduled (non-immediate)
# posts, commit a row to configs/post_queue.yaml — the post_scheduler.yml
# cron picks it up every 15 min.
#
# Caption is read from a file committed to the repo (workflow_dispatch
# string inputs can't carry multi-line text cleanly). Convention:
# scripts/captions/<slug>.txt.

on:
  workflow_dispatch:
    inputs:
      pipeline:
        description: "Pipeline to run"
        type: choice
        default: prayer_reel_pipeline.py
        options:
          - prayer_reel_pipeline.py
          - hook_pivot_pipeline.py
      config:
        description: "Config path (e.g. configs/p2_mom_kids_prayer.yaml)"
        type: string
        required: true
        default: configs/p1_sky.yaml
      caption_file:
        description: "Caption file path (e.g. scripts/captions/p2_mom_kids_prayer.txt)"
        type: string
        required: true
        default: scripts/captions/p1_sky.txt

permissions:
  contents: read

jobs:
  render_and_publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ELEVENLABS_API_KEY:         ${{ secrets.ELEVENLABS_API_KEY }}
      FAL_KEY:                    ${{ secrets.FAL_KEY }}
      GEMINI_API_KEY:             ${{ secrets.GEMINI_API_KEY }}
      R2_ACCOUNT_ID:              ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID:           ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY:       ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT:                ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET:                  ${{ secrets.R2_BUCKET }}
      R2_PUBLIC_BASE_URL:         ${{ secrets.R2_PUBLIC_BASE_URL }}
      IG_USER_ID:                 ${{ secrets.IG_USER_ID }}
      INSTAGRAM_LONG_LIVED_TOKEN: ${{ secrets.INSTAGRAM_LONG_LIVED_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps (ffmpeg, rclone, fonts)
        run: |
          sudo apt-get update
          # fonts-liberation provides Liberation Serif/Sans — the metric-compatible
          # substitutes for Georgia/Arial that prayer_reel_pipeline.py falls back to.
          sudo apt-get install -y ffmpeg rclone fonts-liberation

      - name: Install Python deps
        run: pip install pyyaml python-dotenv requests google-genai

      - name: Validate inputs
        shell: bash
        run: |
          set -eo pipefail
          [ -f "${{ inputs.config }}" ]       || { echo "::error::config not found: ${{ inputs.config }}"; exit 1; }
          [ -f "${{ inputs.caption_file }}" ] || { echo "::error::caption file not found: ${{ inputs.caption_file }}"; exit 1; }
          CHARS=$(wc -c < "${{ inputs.caption_file }}")
          if [ "$CHARS" -gt 2200 ]; then
            echo "::error::caption too long: $CHARS chars (IG max 2200)"; exit 1
          fi
          echo "caption: $CHARS chars"

      # Pillar 2 pre-publish gate (fires before Render so we don't burn Kling
      # credits on a config that will be rejected). Enforces:
      #   - scene must depict a lady
      #   - scene_slot must be unique across configs/p2_*.yaml
      #   - music.path must rotate vs. the last posted Pillar 2 reel
      # See memory: feedback_pillar2_constraints.md
      - name: Validate Pillar 2 constraints
        if: inputs.pipeline == 'prayer_reel_pipeline.py' && startsWith(inputs.config, 'configs/p2_')
        shell: bash
        run: python scripts/validate_pillar2.py "${{ inputs.config }}"

      - name: Render + upload to R2
        id: render
        shell: bash
        run: |
          set -eo pipefail
          python "${{ inputs.pipeline }}" "${{ inputs.config }}" --upload-r2 2>&1 | tee run.log
          URL=$(grep -oE 'https://[^[:space:]]+\.mp4' run.log | tail -1)
          if [ -z "$URL" ]; then
            echo "::error::no R2 URL detected in render output"; exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "rendered: $URL"

      - name: Publish to Instagram
        id: publish
        env:
          VIDEO_URL:    ${{ steps.render.outputs.url }}
          CAPTION_FILE: ${{ inputs.caption_file }}
        shell: bash
        run: |
          set -eo pipefail
          # Use the canonical IG-Login publisher (lib/instagram.py → graph.instagram.com).
          # post_to_instagram.py was removed in PR #7 — it hit the wrong API endpoint.
          python <<'PY' | tee post.log
          import os, sys, requests
          sys.path.insert(0, '.')
          from lib.instagram import post_reel

          url     = os.environ['VIDEO_URL']
          caption = open(os.environ['CAPTION_FILE']).read().rstrip()
          result  = post_reel(url, caption)
          mid     = result['media_id']
          print(f"MEDIA_ID={mid}")

          # Fetch the public permalink for the run summary
          token = os.environ['INSTAGRAM_LONG_LIVED_TOKEN']
          r = requests.get(
              f"https://graph.instagram.com/v21.0/{mid}",
              params={"fields": "permalink", "access_token": token},
              timeout=20,
          )
          if r.ok:
              perma = r.json().get("permalink", "")
              if perma:
                  print(f"PERMALINK={perma}")
          PY
          PERMA=$(grep -oE '^PERMALINK=https?://[^[:space:]]+' post.log | head -1 | cut -d= -f2-)
          MID=$(grep -oE '^MEDIA_ID=[0-9]+' post.log | head -1 | cut -d= -f2-)
          echo "permalink=$PERMA" >> "$GITHUB_OUTPUT"
          echo "media_id=$MID"    >> "$GITHUB_OUTPUT"

      - if: always()
        name: Write run summary
        shell: bash
        run: |
          {
            echo "### Render + publish result"
            echo ""
            echo "- **Pipeline:** \`${{ inputs.pipeline }}\`"
            echo "- **Config:** \`${{ inputs.config }}\`"
            echo "- **Caption file:** \`${{ inputs.caption_file }}\`"
            echo "- **R2 URL:** ${{ steps.render.outputs.url }}"
            echo "- **IG media_id:** ${{ steps.publish.outputs.media_id }}"
            echo "- **IG permalink:** ${{ steps.publish.outputs.permalink }}"
          } >> "$GITHUB_STEP_SUMMARY"
