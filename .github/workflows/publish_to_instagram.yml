name: Publish to Instagram

# Posts a public-URL Reel to @livepraybible via the Graph API.
# Requires the following repo secrets (already set):
#   IG_USER_ID
#   INSTAGRAM_LONG_LIVED_TOKEN

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "Public URL of the .mp4 (e.g. an R2 public link)"
        type: string
        required: true
        default: "https://pub-009ad35726e64a38930ccc6e3aff0a81.r2.dev/p1_wonder.mp4"
      caption:
        description: "Instagram caption (with hashtags)"
        type: string
        required: false
        default: ""

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      IG_USER_ID:                 ${{ secrets.IG_USER_ID }}
      INSTAGRAM_LONG_LIVED_TOKEN: ${{ secrets.INSTAGRAM_LONG_LIVED_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - id: post
        name: Post Reel to Instagram
        run: |
          python scripts/post_to_instagram.py \
            --video-url "${{ inputs.video_url }}" \
            --caption "${{ inputs.caption }}" 2>&1 | tee post.log
          PERMA=$(grep -oE '^PERMALINK=https?://[^[:space:]]+' post.log | head -1 | cut -d= -f2-)
          echo "permalink=$PERMA" >> "$GITHUB_OUTPUT"

      - if: always()
        name: Write run summary
        run: |
          {
            echo "### Instagram publish result"
            echo ""
            echo "- **Video:** ${{ inputs.video_url }}"
            echo "- **Permalink:** ${{ steps.post.outputs.permalink }}"
          } >> "$GITHUB_STEP_SUMMARY"
